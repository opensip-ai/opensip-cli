name: OpenSIP CLI
description: >-
  Run OpenSIP CLI in GitHub Actions without an OpenSIP Cloud account. The action
  runs the built-in audit suite by default and emits PR annotations, optional
  SARIF, optional sticky PR comments, and stable step outputs.
author: OpenSIP
branding:
  icon: check-circle
  color: blue

inputs:
  suite:
    description: Suite name to run when command is not provided.
    required: false
    default: audit
  command:
    description: >-
      Alternative OpenSIP CLI command to run instead of a suite, for example
      "fit --changed" or "graph --recipe agent-risk".
    required: false
    default: ''
  changed:
    description: Scope the default suite run to changed files.
    required: false
    default: 'true'
  annotations:
    description: Emit GitHub workflow annotations from the review brief.
    required: false
    default: 'true'
  sarif:
    description: Generate a SARIF 2.1.0 file derived from the review brief.
    required: false
    default: 'false'
  comment:
    description: Post or update a sticky pull request summary comment.
    required: false
    default: 'false'
  fail-on:
    description: >-
      Failure policy: all-errors, new-errors, new-warnings, or never.
    required: false
    default: new-errors
  config:
    description: Path to opensip-cli.config.yml.
    required: false
    default: ''
  version:
    description: opensip-cli npm version to run with npx.
    required: false
    default: latest
  working-directory:
    description: Directory to run OpenSIP CLI from.
    required: false
    default: '.'

outputs:
  verdict:
    description: pass, warn, or fail.
    value: ${{ steps.opensip.outputs.verdict }}
  issues:
    description: Total issue count reported by the run.
    value: ${{ steps.opensip.outputs.issues }}
  new-issues:
    description: Net-new issue count when baseline evidence is available.
    value: ${{ steps.opensip.outputs.new-issues }}
  sarif:
    description: Path to the generated SARIF file, when sarif is true.
    value: ${{ steps.opensip.outputs.sarif }}
  brief:
    description: Path to the generated review brief JSON file.
    value: ${{ steps.opensip.outputs.brief }}
  degraded:
    description: Comma-separated degraded evidence reasons.
    value: ${{ steps.opensip.outputs.degraded }}

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'

    - name: Run OpenSIP CLI
      id: opensip
      shell: bash
      env:
        INPUT_SUITE: ${{ inputs.suite }}
        INPUT_COMMAND: ${{ inputs.command }}
        INPUT_CHANGED: ${{ inputs.changed }}
        INPUT_ANNOTATIONS: ${{ inputs.annotations }}
        INPUT_SARIF: ${{ inputs.sarif }}
        INPUT_COMMENT: ${{ inputs.comment }}
        INPUT_FAIL_ON: ${{ inputs.fail-on }}
        INPUT_CONFIG: ${{ inputs.config }}
        INPUT_VERSION: ${{ inputs.version }}
        INPUT_WORKING_DIRECTORY: ${{ inputs.working-directory }}
        GITHUB_TOKEN: ${{ github.token }}
      run: node "${{ github.action_path }}/scripts/github-action/run.mjs"
