name: release
on:
  push:
    tags: ['v*']
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install
        run: pnpm install --frozen-lockfile
      # PR-quality gates (ADR-0017) — all four run BEFORE pack/publish.
      - name: Lint
        run: pnpm lint
      - name: Test with coverage
        run: pnpm test:coverage
      - name: Fitness dogfood
        run: pnpm fit:ci
      - name: Graph dogfood
        run: pnpm graph:ci
      - name: Pack tarballs
        run: pnpm --filter "$pkg" pack --pack-destination /tmp/tarballs
      - name: Publish
        run: npm publish /tmp/tarballs/*.tgz --provenance
