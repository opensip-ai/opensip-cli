globalExcludes:
  - 'node_modules/**'

targets:
  rust-source:
    description: 'Sample Rust files'
    languages: [rust]
    concerns: [backend]
    include:
      - 'src/**/*.rs'

  python-source:
    description: 'Sample Python files'
    languages: [python]
    concerns: [backend]
    include:
      - 'src/**/*.py'

  java-source:
    description: 'Sample Java files'
    languages: [java]
    concerns: [backend]
    include:
      - 'src/**/*.java'

  go-source:
    description: 'Sample Go files'
    languages: [go]
    concerns: [backend]
    include:
      - 'src/**/*.go'

  cpp-source:
    description: 'Sample C++ files'
    languages: [cpp]
    concerns: [backend]
    include:
      - 'src/**/*.cpp'
      - 'src/**/*.hpp'

  typescript-source:
    description: 'Sample TypeScript files'
    languages: [typescript]
    concerns: [backend]
    include:
      - 'src/**/*.ts'

fitness:
  failOnErrors: 0
  failOnWarnings: 0
  disabledChecks: []
