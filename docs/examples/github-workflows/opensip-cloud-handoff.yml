# Example: ship `opensip fit` findings to OpenSIP Cloud on every PR.
#
# Copy this into a CONSUMER repository as
# `.github/workflows/opensip-cloud-handoff.yml`. It runs `opensip fit` and
# uploads the SARIF to your OpenSIP Cloud tenant, attributed to this repo via
# `x-opensip-repo`. The next reconciler tick turns the signals into tickets.
#
# Prerequisites:
#   - A repository/organization secret `OPENSIP_API_KEY` holding an `osk_…` key
#     with the `ingest:write` permission (operator/admin role).
#   - The checkout step below (a git working tree is required so the CLI can
#     derive `<org>/<repo>` from the origin remote).
name: OpenSIP Cloud handoff

on:
  pull_request:
  push:
    branches: [main]

# Least-privilege: this workflow only reads the repo and talks to OpenSIP Cloud.
permissions:
  contents: read

jobs:
  handoff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run opensip fit and upload findings to OpenSIP Cloud
        uses: opensip-ai/opensip-cli@v0
        with:
          api-key: ${{ secrets.OPENSIP_API_KEY }}
          # cloud-url: https://api.opensip.ai/v1/ingest   # default
          # args: --recipe my-recipe
          # fail-on-upload-error: true
