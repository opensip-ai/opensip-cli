name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # softprops/action-gh-release creates the GitHub Release
      id-token: write       # OIDC token for npm trusted publishing
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      # npm 11.5+ is required for the OIDC token-exchange handshake with
      # GitHub Actions. Node 22 ships with npm 10. We install npm 11 to a
      # separate prefix and prepend to $PATH because `npm install -g npm@11`
      # corrupts mid-install on hosted runners (npm unlinks files of its
      # own running process — "Cannot find module 'promise-retry'").
      - name: Install npm 11 to separate prefix (avoids self-replace bug)
        run: |
          npm install --prefix "$HOME/.npm-cli" npm@11
          echo "$HOME/.npm-cli/node_modules/.bin" >> "$GITHUB_PATH"

      - run: npm --version
      - run: pnpm install --frozen-lockfile

      # Release consistency gate. Catches half-bumped versions, tag
      # mismatch, missing CHANGELOG entry, stale generated docs, and
      # cross-package dep ranges that drifted off-consensus. Cheap (~1s);
      # fail-fast here saves a wasted build + the post-publish blast
      # radius of a broken release.
      - name: Verify release consistency
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: node tools/verify-release.mjs --expected-version "$RELEASE_TAG"

      # Clean every package's dist/ before build. tsc never deletes orphan
      # output files when their source is moved or removed, and `files:
      # ["dist"]` in package.json blindly globs the whole tree — so a
      # stale dist (from a local build or a Turbo cache restore) can
      # leak ghost modules into the published tarball, which is exactly
      # how v1.0.4 shipped with orphaned commands/{fit,sim,dashboard,
      # list-checks,list-recipes}.js after they moved into the tool
      # packages. Cleaning here is cheap and guarantees a fresh dist.
      - run: pnpm -r run clean
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test

      # Probe the registry for every package we are about to publish. A
      # package whose name is not yet on npm needs trusted publishing
      # configured on npmjs.com (org opensip-ai → package settings →
      # Publishing access) before the publish step will succeed — see
      # RELEASING.md "Prerequisites". We only warn here; the publish step
      # is the authoritative gate. The warning gives a named, predictable
      # failure point so a later 404 from `npm publish` is easy to map
      # back to "trusted publisher missing" rather than "registry flake".
      - name: Preflight — detect packages not yet on npm
        run: |
          set -u
          new_count=0
          for pkg in \
            core \
            datastore \
            contracts \
            lang-typescript lang-rust lang-python lang-go lang-java lang-cpp \
            dashboard \
            fitness simulation graph \
            graph-typescript \
            checks-universal checks-typescript checks-python checks-go checks-java checks-cpp \
            cli ; do
            name="@opensip-tools/$pkg"
            if npm view "$name" version >/dev/null 2>&1 ; then
              echo "  ok  $name"
            else
              echo "::warning title=New package detected::$name is not yet on npm. Publish will fail unless trusted publisher is registered on npmjs.com (org opensip-ai → package settings → Publishing access)."
              new_count=$((new_count + 1))
            fi
          done
          if [ "$new_count" -gt 0 ] ; then
            echo "::notice::$new_count new package(s) detected. Continuing — publish step will fail loudly for any unregistered trusted publisher."
          fi

      # Pack every workspace package into a tarball. `pnpm pack` resolves
      # workspace:* deps into concrete versions, which `npm publish` then
      # uploads. We pack all 19 up front so the publish step can run
      # against a known-good set of tarballs in dependency order.
      - name: Pack all workspace packages (resolves workspace:*)
        run: |
          mkdir -p /tmp/tarballs
          # Layer 1 — kernel
          pnpm --filter @opensip-tools/core             pack --pack-destination /tmp/tarballs
          # Layer 2 — datastore (SQLite + Drizzle persistence)
          pnpm --filter @opensip-tools/datastore        pack --pack-destination /tmp/tarballs
          # Layer 2 — shared CLI infra
          pnpm --filter @opensip-tools/contracts       pack --pack-destination /tmp/tarballs
          # Layer 3 — language adapters
          pnpm --filter @opensip-tools/lang-typescript  pack --pack-destination /tmp/tarballs
          pnpm --filter @opensip-tools/lang-rust        pack --pack-destination /tmp/tarballs
          pnpm --filter @opensip-tools/lang-python      pack --pack-destination /tmp/tarballs
          pnpm --filter @opensip-tools/lang-go          pack --pack-destination /tmp/tarballs
          pnpm --filter @opensip-tools/lang-java        pack --pack-destination /tmp/tarballs
          pnpm --filter @opensip-tools/lang-cpp         pack --pack-destination /tmp/tarballs
          # Layer 3 — dashboard (depends on core + contracts only; consumed by fitness)
          pnpm --filter @opensip-tools/dashboard        pack --pack-destination /tmp/tarballs
          # Layer 3 — tools
          pnpm --filter @opensip-tools/fitness          pack --pack-destination /tmp/tarballs
          pnpm --filter @opensip-tools/simulation       pack --pack-destination /tmp/tarballs
          pnpm --filter @opensip-tools/graph            pack --pack-destination /tmp/tarballs
          # Layer 3.5 — graph adapter packs (depend on graph engine)
          pnpm --filter @opensip-tools/graph-typescript pack --pack-destination /tmp/tarballs
          # Layer 4 — check packs
          pnpm --filter @opensip-tools/checks-universal  pack --pack-destination /tmp/tarballs
          pnpm --filter @opensip-tools/checks-typescript pack --pack-destination /tmp/tarballs
          pnpm --filter @opensip-tools/checks-python     pack --pack-destination /tmp/tarballs
          pnpm --filter @opensip-tools/checks-go         pack --pack-destination /tmp/tarballs
          pnpm --filter @opensip-tools/checks-java       pack --pack-destination /tmp/tarballs
          pnpm --filter @opensip-tools/checks-cpp        pack --pack-destination /tmp/tarballs
          # Layer 5 — composition root
          pnpm --filter @opensip-tools/cli              pack --pack-destination /tmp/tarballs
          ls -la /tmp/tarballs

      # Publish in strict dependency order. Sequential (not parallel) by
      # design — racing a downstream publish ahead of its upstream
      # produces a broken release because the upstream version isn't in
      # the registry yet when downstream's `dependencies` field is
      # resolved by consumers.
      #
      # `npm publish <tarball>` performs the OIDC handshake (unlike
      # `pnpm publish`, which uses its own HTTP client and skips OIDC).
      #
      # Idempotent — already-published versions are skipped, so re-running
      # the workflow on the same tag is safe (e.g. after a network blip
      # halfway through the publish loop).
      - name: Publish via npm (OIDC trusted publishing)
        run: |
          set -e
          VERSION=$(node -p "require('./packages/core/package.json').version")
          echo "Publishing version: $VERSION"

          publish_if_new() {
            local pkg="$1"
            local name="@opensip-tools/$pkg"
            if npm view "${name}@${VERSION}" version >/dev/null 2>&1; then
              echo "::notice::skip ${name}@${VERSION} (already on npm)"
              return 0
            fi
            npm publish /tmp/tarballs/opensip-tools-${pkg}-*.tgz --access public --provenance
          }

          # Layer 1 — kernel
          publish_if_new core
          # Layer 2 — datastore (SQLite + Drizzle persistence)
          publish_if_new datastore
          # Layer 2 — shared CLI infra
          publish_if_new contracts
          # Layer 3 — language adapters (lang-typescript first; downstream check packs depend on it)
          publish_if_new lang-typescript
          publish_if_new lang-rust
          publish_if_new lang-python
          publish_if_new lang-go
          publish_if_new lang-java
          publish_if_new lang-cpp
          # Layer 3 — dashboard (depends on core + contracts only; published before fitness)
          publish_if_new dashboard
          # Layer 3 — tools (depend on core, contracts, lang-typescript, dashboard)
          publish_if_new fitness
          publish_if_new simulation
          publish_if_new graph
          # Layer 3.5 — graph adapter packs (depend on graph engine)
          publish_if_new graph-typescript
          # Layer 4 — check packs (depend on fitness)
          publish_if_new checks-universal
          publish_if_new checks-typescript
          publish_if_new checks-python
          publish_if_new checks-go
          publish_if_new checks-java
          publish_if_new checks-cpp
          # Layer 5 — CLI (depends on every tool, every check pack, every adapter)
          publish_if_new cli

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
