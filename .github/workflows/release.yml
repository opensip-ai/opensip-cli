name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - name: Install npm 11 to separate prefix (avoids self-replace bug)
        run: |
          npm install --prefix "$HOME/.npm-cli" npm@11
          echo "$HOME/.npm-cli/node_modules/.bin" >> "$GITHUB_PATH"
      - run: npm --version
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test
      - name: Pack workspace packages (resolves workspace:*)
        run: |
          mkdir -p /tmp/tarballs
          pnpm --filter @opensip-tools/core pack --pack-destination /tmp/tarballs
          pnpm --filter @opensip-tools/checks-builtin pack --pack-destination /tmp/tarballs
          pnpm --filter @opensip-tools/simulation pack --pack-destination /tmp/tarballs
          pnpm --filter @opensip-tools/cli pack --pack-destination /tmp/tarballs
      - name: Publish via npm (OIDC trusted publishing)
        run: |
          npm publish /tmp/tarballs/opensip-tools-core-*.tgz --access public --provenance
          npm publish /tmp/tarballs/opensip-tools-checks-builtin-*.tgz --access public --provenance
          npm publish /tmp/tarballs/opensip-tools-simulation-*.tgz --access public --provenance
          npm publish /tmp/tarballs/opensip-tools-cli-*.tgz --access public --provenance
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
