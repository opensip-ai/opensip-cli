name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    strategy:
      matrix:
        node-version: [22]

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      # Runs the full test suite WITH coverage so the per-package thresholds
      # in each vitest.config.ts are enforced on every PR. Coverage had
      # silently drifted below threshold in 13 packages because the gate only
      # ran `pnpm test` (no `--coverage`); test:coverage closes that hole.
      - name: Test (with coverage thresholds)
        run: pnpm test:coverage

      # Dogfood: run opensip-tools fit against this repo. The CI step
      # fails on any error-level finding (failOnErrors: 1 in
      # opensip-tools.config.yml). See docs/plans/ready/dogfood-fit-against-self/
      # for the full design. See CLAUDE.md "Dogfood Gate" for the
      # contributor workflow.
      - name: Fit (dogfood)
        id: fit
        run: pnpm fit:ci

      - name: Export fit baseline to SARIF
        if: always() && steps.fit.outcome != 'skipped'
        run: node packages/cli/dist/index.js fit-baseline-export --out fit.sarif

      - name: Upload fit SARIF
        if: always() && hashFiles('fit.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: fit.sarif
          category: opensip-tools-fit

      # Dogfood the graph tool the same way as fit: --gate-save records the
      # current Signals into the (CI-ephemeral) datastore, then the SARIF export
      # is uploaded to Code Scanning. GH compares against the latest main-branch
      # graph SARIF and surfaces only NET-NEW graph findings on PR diffs.
      - name: Graph (dogfood)
        id: graph
        run: pnpm graph:ci

      - name: Export graph baseline to SARIF
        if: always() && steps.graph.outcome != 'skipped'
        run: node packages/cli/dist/index.js graph-baseline-export --out graph.sarif

      - name: Upload graph SARIF
        if: always() && hashFiles('graph.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: graph.sarif
          category: opensip-tools-graph

      # Verify docs/web-generated/ (the website-facing transformed copy
      # of docs/public/) is in sync with its source. Editors who change
      # docs/public/*.md must regenerate docs/web-generated/ by running
      # `node scripts/build-web-docs.mjs` and committing the result. The
      # website at opensip.ai/docs/opensip-tools/ fetches
      # docs/web-generated/ directly, so stale output is a user-visible
      # bug.
      - name: Check generated web docs in sync
        run: node scripts/build-web-docs.mjs --check

      # Verify docs/public/70-reference/05-checks-index.md is in sync with
      # the checks corpus. Adding, removing, or re-describing a check
      # changes the generated index; regenerate via `pnpm docs:checks-index`
      # and commit the result. The `last_verified` date stamp is ignored.
      - name: Check generated checks index in sync
        run: pnpm docs:checks-index:check

      # npm renders each package's page from the README inside *that* package's
      # tarball, so a stale or missing per-package README ships straight to
      # npmjs.com. The READMEs are generated from package.json metadata via
      # `pnpm docs:readmes`; regenerate and commit if this fails.
      - name: Check generated package READMEs in sync
        run: pnpm docs:readmes:check

      # npm weights the keywords field in package search. They're derived from
      # each package's identity by `pnpm docs:keywords`; a new package that
      # ships with stale/missing keywords fails here.
      - name: Check package keywords in sync
        run: pnpm docs:keywords:check
