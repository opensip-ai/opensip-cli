name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    strategy:
      matrix:
        node-version: [22]

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Clean every package's dist/ before build so the dogfood gates
      # (fit:ci / graph:ci, which run the compiled engine from dist) can
      # never execute a stale or Turbo-cache-restored binary that lags the
      # source. Matches release.yml's pre-build clean; cheap on a fresh
      # checkout and guarantees the analyzed source and running engine agree.
      - name: Clean dist
        run: pnpm -r run clean

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Verify package supply-chain policy
        run: pnpm supply-chain:verify

      # Runs the full test suite WITH coverage so the per-package thresholds
      # in each vitest.config.ts are enforced on every PR. Coverage had
      # silently drifted below threshold in 13 packages because the gate only
      # ran `pnpm test` (no `--coverage`); test:coverage closes that hole.
      #
      # This step also runs the per-check pass/fail fixture-coverage meta-tests
      # (each pack's src/__tests__/fixture-coverage.test.ts) — they are ordinary
      # vitest files, so a shipped check with no clean/violation fixture fails CI
      # here with no separate step. See docs/public/50-extend/04-check-pack-architecture.md.
      #
      # It also runs the per-language CLI acceptance matrix
      # (packages/cli/src/__tests__/language-acceptance.test.ts) and the e2e
      # suites, which spawn the built CLI via the shared acceptance harness —
      # hence the `pnpm build` step above is a prerequisite. (Register PR lane.)
      - name: Test (with coverage thresholds)
        run: pnpm test:coverage

      # Dogfood: run opensip-tools fit against this repo. The CI step itself
      # hard-fails on any error-level finding: `fit --gate-save` returns the
      # `failOnErrors`/`failOnWarnings` exit code (ADR-0020), so enforcement does
      # not depend solely on the downstream Code Scanning net-new ratchet. The
      # baseline + SARIF still export below under `if: always()`, surviving a
      # failed gate. See CLAUDE.md "Dogfood Gate" for the contributor workflow.
      - name: Fit (dogfood)
        id: fit
        run: pnpm fit:ci

      - name: Export fit baseline to SARIF
        if: always() && steps.fit.outcome != 'skipped'
        run: node packages/cli/dist/index.js fit-baseline-export --out fit.sarif

      - name: Upload fit SARIF
        if: always() && hashFiles('fit.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: fit.sarif
          category: opensip-tools-fit

      # Dogfood the graph tool the same way as fit: --gate-save records the
      # current Signals into the (CI-ephemeral) datastore AND hard-fails the CI
      # step on any error-level graph finding (core's isErrorSignal rung —
      # `critical`/`high`; ADR-0020), mirroring fit:ci. The findings reaching the
      # gate are already `@graph-ignore`-suppression-filtered (ADR-0014), so only
      # UNSUPPRESSED error-level findings trip it. The SARIF export then runs below
      # under `if: always()` (surviving a failed gate); GH compares against the
      # latest main-branch graph SARIF and surfaces NET-NEW graph findings on PR
      # diffs as the complementary annotation layer.
      - name: Graph (dogfood)
        id: graph
        run: pnpm graph:ci

      - name: Export graph baseline to SARIF
        if: always() && steps.graph.outcome != 'skipped'
        run: node packages/cli/dist/index.js graph-baseline-export --out graph.sarif

      - name: Upload graph SARIF
        if: always() && hashFiles('graph.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: graph.sarif
          category: opensip-tools-graph

      # Verify docs/web-generated/ (the website-facing transformed copy
      # of docs/public/) is in sync with its source. Editors who change
      # docs/public/*.md must regenerate docs/web-generated/ by running
      # `node scripts/build-web-docs.mjs` and committing the result. The
      # website at opensip.ai/docs/opensip-tools/ fetches
      # docs/web-generated/ directly, so stale output is a user-visible
      # bug.
      - name: Check generated web docs in sync
        run: node scripts/build-web-docs.mjs --check

      # Verify docs/public/70-reference/05-checks-index.md is in sync with
      # the checks corpus. Adding, removing, or re-describing a check
      # changes the generated index; regenerate via `pnpm docs:checks-index`
      # and commit the result. The `last_verified` date stamp is ignored.
      - name: Check generated checks index in sync
        run: pnpm docs:checks-index:check

      # npm renders each package's page from the README inside *that* package's
      # tarball, so a stale or missing per-package README ships straight to
      # npmjs.com. The READMEs are generated from package.json metadata via
      # `pnpm docs:readmes`; regenerate and commit if this fails.
      - name: Check generated package READMEs in sync
        run: pnpm docs:readmes:check

      # npm weights the keywords field in package search. They're derived from
      # each package's identity by `pnpm docs:keywords`; a new package that
      # ships with stale/missing keywords fails here.
      - name: Check package keywords in sync
        run: pnpm docs:keywords:check
