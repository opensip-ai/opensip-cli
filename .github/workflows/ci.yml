name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      # Verify docs/web/ (the website-facing transformed copy of
      # docs/architecture/) is in sync with its source. Editors who
      # change docs/architecture/*.md must regenerate docs/web/ by
      # running `node tools/build-web-docs.mjs` and committing the
      # result. The website at opensip.ai/docs/opensip-tools/ fetches
      # docs/web/ directly, so stale output is a user-visible bug.
      - name: Check web docs in sync
        run: node tools/build-web-docs.mjs --check
