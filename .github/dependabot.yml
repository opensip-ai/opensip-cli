# Dependency update automation (ADR-0069). Opens PRs for maintainer review;
# pnpm trust policy in pnpm-workspace.yaml is never edited automatically.
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
    commit-message:
      prefix: chore(deps)
    groups:
      patch-and-minor:
        patterns:
          - '*'
        update-types:
          - patch
          - minor
    ignore:
      # Deferred until the repo's supported Node runtime floor moves past 24.x.
      - dependency-name: '@types/node'
        update-types:
          - version-update:semver-major
      # Major lint-rule migrations need dedicated policy/fix work.
      - dependency-name: eslint-plugin-unicorn
        update-types:
          - version-update:semver-major
      # sonarjs 4.1 currently creates broad lint churn; keep patch updates flowing.
      - dependency-name: eslint-plugin-sonarjs
        update-types:
          - version-update:semver-minor
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: chore(ci)
